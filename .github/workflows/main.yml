name: Deploy OSL Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check web folder
        run: |
          ls -la
          test -d web

      - name: Upload static files
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
